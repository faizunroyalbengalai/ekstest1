name: Deploy python to EKS

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: ekstest1
  APP_NAME: python
  PYTHON_ENTRYPOINT: app.main:app
  PORT: 8000

jobs:
  provision:
    name: Provision EKS Cluster
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      cluster_endpoint: ${{ steps.tf_outputs.outputs.cluster_endpoint }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=us-east-1"

      - name: Capture Terraform Outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=${CLUSTER_ENDPOINT}" >> $GITHUB_OUTPUT

  configure:
    name: Build and Deploy to EKS
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ env.PROJECT_NAME }}-${{ env.APP_NAME }} \
            --region us-east-1 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ env.PROJECT_NAME }}-${{ env.APP_NAME }} \
            --region us-east-1

      - name: Build Docker Image
        run: |
          ECR_REGISTRY=${{ steps.ecr_login.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t ${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-${{ env.APP_NAME }}:${IMAGE_TAG} \
            -t ${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-${{ env.APP_NAME }}:latest \
            -f - . <<'DOCKERFILE'
          FROM python:3.11-slim

          WORKDIR /opt/app

          COPY requirements.txt ./
          RUN pip install --no-cache-dir -r requirements.txt

          COPY . .

          EXPOSE 8000

          CMD ["gunicorn", "app.main:app", "-k", "uvicorn.workers.UvicornWorker", "-w", "4", "-b", "0.0.0.0:8000"]
          DOCKERFILE

      - name: Push Docker Image to ECR
        run: |
          ECR_REGISTRY=${{ steps.ecr_login.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          docker push ${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-${{ env.APP_NAME }}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-${{ env.APP_NAME }}:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name ${{ needs.provision.outputs.cluster_name }}

      - name: Create Kubernetes Namespace
        run: |
          kubectl get namespace ${{ env.PROJECT_NAME }} 2>/dev/null || \
          kubectl create namespace ${{ env.PROJECT_NAME }}

      - name: Deploy Application to EKS
        run: |
          ECR_REGISTRY=${{ steps.ecr_login.outputs.registry }}
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${ECR_REGISTRY}/${{ env.PROJECT_NAME }}-${{ env.APP_NAME }}:${IMAGE_TAG}"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ env.APP_NAME }}
            namespace: ${{ env.PROJECT_NAME }}
            labels:
              app: ${{ env.APP_NAME }}
              project: ${{ env.PROJECT_NAME }}
              managed-by: devops-agent
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: ${{ env.APP_NAME }}
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            template:
              metadata:
                labels:
                  app: ${{ env.APP_NAME }}
                  project: ${{ env.PROJECT_NAME }}
              spec:
                containers:
                - name: ${{ env.APP_NAME }}
                  image: ${IMAGE}
                  ports:
                  - containerPort: 8000
                    protocol: TCP
                  env:
                  - name: PORT
                    value: "8000"
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 20
                    periodSeconds: 15
                    failureThreshold: 3
                  resources:
                    requests:
                      cpu: "250m"
                      memory: "256Mi"
                    limits:
                      cpu: "500m"
                      memory: "512Mi"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ env.APP_NAME }}-service
            namespace: ${{ env.PROJECT_NAME }}
            labels:
              app: ${{ env.APP_NAME }}
              project: ${{ env.PROJECT_NAME }}
              managed-by: devops-agent
          spec:
            selector:
              app: ${{ env.APP_NAME }}
            ports:
            - protocol: TCP
              port: 80
              targetPort: 8000
            type: LoadBalancer
          EOF

      - name: Wait for Deployment Rollout
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.PROJECT_NAME }} \
            --timeout=300s

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name ${{ needs.provision.outputs.cluster_name }}

      - name: Get LoadBalancer Endpoint
        id: get_endpoint
        run: |
          echo "Waiting for LoadBalancer to be assigned..."
          for i in $(seq 1 30); do
            LB_HOST=$(kubectl get svc ${{ env.APP_NAME }}-service \
              -n ${{ env.PROJECT_NAME }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "${LB_HOST}" ]; then
              echo "LoadBalancer hostname: ${LB_HOST}"
              echo "lb_host=${LB_HOST}" >> $GITHUB_OUTPUT
              break
            fi
            echo "Attempt ${i}/30 — LoadBalancer not ready yet, waiting 15s..."
            sleep 15
          done
          if [ -z "${LB_HOST}" ]; then
            echo "ERROR: LoadBalancer hostname not assigned after 30 attempts"
            exit 1
          fi

      - name: Verify Health Endpoint
        run: |
          LB_HOST=${{ steps.get_endpoint.outputs.lb_host }}
          echo "Verifying health endpoint at http://${LB_HOST}/health"
          for i in $(seq 1 20); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 15 \
              "http://${LB_HOST}/health" || echo "000")
            echo "Attempt ${i}/20 — HTTP status: ${HTTP_STATUS}"
            if [ "${HTTP_STATUS}" = "200" ]; then
              echo "Health check passed with status 200"
              break
            fi
            if [ "${i}" = "20" ]; then
              echo "ERROR: Health check failed after 20 attempts"
              exit 1
            fi
            sleep 15
          done

      - name: Show Deployment Status
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.PROJECT_NAME }} -l app=${{ env.APP_NAME }}
          echo ""
          echo "=== Service ==="
          kubectl get svc ${{ env.APP_NAME }}-service -n ${{ env.PROJECT_NAME }}
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n ${{ env.PROJECT_NAME }} \
            --sort-by='.lastTimestamp' | tail -20

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: latest

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region us-east-1 \
            --name ${{ needs.provision.outputs.cluster_name }}

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  DEPLOYMENT SUMMARY"
          echo "============================================"
          echo "  Project     : ${{ env.PROJECT_NAME }}"
          echo "  Application : ${{ env.APP_NAME }}"
          echo "  Region      : us-east-1"
          echo "  Cluster     : ${{ needs.provision.outputs.cluster_name }}"
          echo "  Image Tag   : ${{ github.sha }}"
          echo "  Entrypoint  : ${{ env.PYTHON_ENTRYPOINT }}"
          echo "  Namespace   : ${{ env.PROJECT_NAME }}"
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Run ID      : ${{ github.run_id }}"
          LB_HOST=$(kubectl get svc ${{ env.APP_NAME }}-service \
            -n ${{ env.PROJECT_NAME }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "unavailable")
          echo "  App URL     : http://${LB_HOST}"
          echo "  Health URL  : http://${LB_HOST}/health"
          echo "============================================"
          if [ "${{ needs.verify.result }}" = "success" ]; then
            echo "  STATUS: DEPLOYMENT SUCCEEDED"
          else
            echo "  STATUS: DEPLOYMENT FAILED"
            exit 1
          fi
          echo "============================================"